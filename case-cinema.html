<!doctype html><html lang="ru"><head>
<meta charset="utf-8"><meta name="robots" content="noindex,nofollow"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>V1 Кинематографичная — Гонки на плотах / InWave</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="base.css">
<style>
body{background:#111214;color:#e9eaec}
.cine-hero{position:relative;height:100vh;min-height:640px;overflow:hidden}
.cine-hero video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.cine-hero .veil{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.55) 0%,rgba(0,0,0,.15) 40%,rgba(17,18,20,.95) 100%)}
.cine-hero .inner{position:absolute;left:0;right:0;bottom:64px}
.cine-hero .eyebrow{color:#fff;background:var(--green);display:inline-block;padding:7px 16px;border-radius:100px;margin-bottom:22px}
.cine-hero h1{color:#fff;max-width:15ch}
.cine-hero .sub{max-width:52ch;color:#d6d8db;font-size:23px;margin-top:20px}
.cine-meta{display:flex;gap:44px;flex-wrap:wrap;margin-top:34px}
.cine-meta .statnum{font-size:clamp(38px,4vw,62px)}
.cine-meta small{display:block;color:#9aa0a6;font-size:15px;margin-top:6px;max-width:20ch}
.narr{max-width:820px;margin:0 auto}
.narr p{font-size:24px;line-height:1.6;color:#d6d8db}
.metband{background:var(--green);color:#062;border-radius:var(--radius);padding:56px;text-align:center;color:#04381f}
.metband .statnum{color:#fff}
.vgrid{display:grid;grid-template-columns:1fr 1fr;gap:22px}
.vgrid .vframe{aspect-ratio:16/10}
.reslist{display:grid;grid-template-columns:1fr 1fr;gap:22px}
.rescard{background:#1a1c1f;border:1px solid #2a2c30;border-radius:var(--radius);padding:34px}
.rescard .statnum{font-size:56px}
.ftr{background:#0c0d0f}
@media(max-width:760px){.vgrid,.reslist{grid-template-columns:1fr}}
</style></head>
<body data-variant="1">
<div data-header="dark"></div>

<section class="cine-hero">
  <video src="video/raft-hero.mp4" poster="video/raft-hero.jpg" autoplay muted loop playsinline></video>
  <div class="veil"></div>
  <div class="inner"><div class="container" id="hi"></div></div>
</section>

<section class="sec"><div class="container narr" id="narr"></div></section>

<section class="sec" style="padding-top:0"><div class="container"><div class="metband" id="met"></div></div></section>

<section class="sec" style="padding-top:0"><div class="container">
  <div class="eyebrow" style="margin-bottom:26px">Видеохроника дня · 5 роликов</div>
  <div class="vgrid" id="vg"></div>
</div></section>

<section class="sec" style="padding-top:0"><div class="container">
  <h2 style="color:#fff;margin-bottom:34px">Результат</h2>
  <div class="reslist" id="res"></div>
  <div style="text-align:center;margin-top:60px">
    <a class="btn btn-green" href="#">Хочу такой тимбилдинг</a>
  </div>
</div></section>

<div data-footer></div>
<script src="data.js"></script>
<script>
const c=window.CASE;
hi.innerHTML=`<span class="eyebrow">${c.season} · ${c.client}</span>
  <h1>${c.program}</h1>
  <p class="sub">${c.tagline}</p>
  <div class="cine-meta">
    <div><div class="statnum">${c.people}</div><small>${c.peopleLabel}</small></div>
    <div><div class="statnum">${c.metric}</div><small>${c.metricLabel}</small></div>
    <div><div class="statnum">5</div><small>видеороликов с площадки</small></div>
  </div>`;
narr.innerHTML=`<p class="lead" style="font-size:27px;color:#fff">${c.lead}</p>`+c.story.map(s=>`<p>${s}</p>`).join('')+
  `<p style="color:#fff;font-weight:500">Задача: ${c.task}</p>`;
met.innerHTML=`<div class="statnum">${c.metric}</div><h2 style="color:#04381f;margin-top:10px">${c.metricLabel}</h2>`;
vg.innerHTML=c.videos.map(v=>`<div class="vframe" role="button">
  <video preload="none" poster="${v.poster}" data-src="${v.src}"></video>
  ${v.tag?`<span class="vtag">${v.tag}</span>`:''}<span class="vlabel">${v.title}</span>
  <span class="play"><span></span></span></div>`).join('');
res.innerHTML=c.result.map((r,i)=>`<div class="rescard">
  ${i===1?`<div class="statnum">+30%</div>`:`<div class="statnum">100%</div>`}
  <p style="margin:14px 0 0;color:#d6d8db;font-size:20px">${r}</p></div>`).join('');
</script>
<script src="common.js"></script>
</body></html>
