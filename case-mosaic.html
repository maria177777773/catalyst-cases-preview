<!doctype html><html lang="ru"><head>
<meta charset="utf-8"><meta name="robots" content="noindex,nofollow"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>V6 Видео-мозаика — Гонки на плотах / InWave</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="base.css">
<style>
body{background:#111214;color:#e9eaec}
.top{padding:70px 0 40px;text-align:center}
.top h1{color:#fff;margin:16px auto 18px;max-width:16ch}
.top .lead{color:#cfd2d6;max-width:64ch;margin:0 auto}
.top .chips{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:26px}
.top .chip{background:#1a1c1f;border-color:#2a2c30;color:#e9eaec}
.bento{display:grid;grid-template-columns:repeat(4,1fr);grid-auto-rows:210px;gap:18px}
.bento .vframe{width:100%;height:100%}
.b-hero{grid-column:span 2;grid-row:span 2}
.b-wide{grid-column:span 2}
.txtcard{background:var(--green);color:#04381f;border-radius:var(--radius);padding:34px;display:flex;flex-direction:column;justify-content:center}
.txtcard.dark{background:#1a1c1f;color:#e9eaec;border:1px solid #2a2c30}
.txtcard .statnum{color:#fff;font-size:56px}
.txtcard.dark .statnum{color:var(--green)}
.strip{display:grid;grid-template-columns:1fr 1fr;gap:30px;align-items:center}
.reschips{display:flex;flex-direction:column;gap:14px}
.reschips div{background:#1a1c1f;border:1px solid #2a2c30;border-radius:16px;padding:20px 24px;font-size:19px}
.ftr{background:#0c0d0f}
@media(max-width:900px){.bento{grid-template-columns:1fr 1fr;grid-auto-rows:180px}.b-hero{grid-column:span 2}.strip{grid-template-columns:1fr}}
</style></head>
<body data-variant="6">
<div data-header="dark"></div>

<section class="top"><div class="container">
  <span class="eyebrow" id="eb"></span>
  <h1 id="h1"></h1>
  <p class="lead" id="lead"></p>
  <div class="chips" id="chips"></div>
</div></section>

<section style="padding-bottom:var(--sec)"><div class="container">
  <div class="bento" id="bento"></div>
</div></section>

<section class="sec" style="padding-top:0"><div class="container">
  <div class="strip">
    <div><span class="eyebrow">Задача</span><h2 style="color:#fff;margin:12px 0 16px" id="task"></h2>
      <div id="story"></div></div>
    <div class="reschips" id="res"></div>
  </div>
  <div style="text-align:center;margin-top:64px"><a class="btn btn-green" href="#">Хочу такой тимбилдинг</a></div>
</div></section>

<div data-footer></div>
<script src="data.js"></script>
<script>
const c=window.CASE;
eb.textContent='Кейс · '+c.client+' · '+c.season;
h1.textContent=c.program;
lead.textContent=c.lead;
chips.innerHTML=[c.people+' участников','☔ ливень, 0 отмен',c.metric+' коммуникация','5 видео']
  .map(t=>`<span class="chip">${t}</span>`).join('');
function vf(v,cls,big){return `<div class="vframe ${cls}" role="button">
  <video preload="none" poster="${v.poster}" data-src="${v.src}"></video>
  ${v.tag?`<span class="vtag">${v.tag}</span>`:''}<span class="vlabel"${big?'':' style="font-size:16px"'}>${v.title}</span>
  <span class="play"><span${big?'':' style="width:56px;height:56px"'}></span></span></div>`;}
bento.innerHTML =
  vf(c.videos[0],'b-hero',true) +
  vf(c.videos[4],'',false) +
  vf(c.videos[1],'',false) +
  `<div class="txtcard"><div class="statnum">${c.metric}</div><p style="margin:8px 0 0;font-weight:500">${c.metricLabel}</p></div>` +
  vf(c.videos[2],'',false) +
  vf(c.videos[3],'b-wide',true) +
  `<div class="txtcard dark"><div class="statnum">${c.people}</div><p style="margin:8px 0 0">участников на одной программе</p></div>`;
task.textContent=c.task;
story.innerHTML=c.story.map(s=>`<p style="color:#cfd2d6">${s}</p>`).join('');
res.innerHTML=c.result.map(r=>`<div>✅ ${r}</div>`).join('');
</script>
<script src="common.js"></script>
</body></html>
