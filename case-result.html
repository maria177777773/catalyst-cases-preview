<!doctype html><html lang="ru"><head>
<meta charset="utf-8"><meta name="robots" content="noindex,nofollow"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>V5 Результат-вперёд — Гонки на плотах / InWave</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="base.css">
<style>
.rhero{padding-top:70px}
.rhero h1{max-width:16ch;margin:14px 0 22px}
.statrow{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:40px}
.scard{border:1px solid var(--line);border-radius:var(--radius);padding:34px;background:var(--paper)}
.scard.accent{background:var(--green);color:#fff;border-color:var(--green)}
.scard.accent .statnum{color:#fff}
.scard p{margin:10px 0 0;color:var(--gray);font-size:17px}
.scard.accent p{color:rgba(255,255,255,.92)}
.proof{display:grid;grid-template-columns:1.4fr 1fr;gap:22px}
.proof .vframe.main{aspect-ratio:16/10}
.proof .side{display:grid;grid-template-rows:1fr 1fr;gap:22px}
.proof .side .vframe{aspect-ratio:16/9}
.two{display:grid;grid-template-columns:1fr 1fr;gap:50px;align-items:start}
.tbox{background:var(--ink);color:#fff;border-radius:var(--radius);padding:44px}
.tbox h2{color:#fff}
.donen .it{display:flex;gap:16px;padding:14px 0;border-top:1px solid var(--line)}
.donen .it b{color:var(--green);font-family:var(--disp);font-weight:800}
@media(max-width:820px){.statrow{grid-template-columns:1fr}.proof,.two{grid-template-columns:1fr}}
</style></head>
<body data-variant="5">
<div data-header="light"></div>

<section class="rhero"><div class="container">
  <span class="eyebrow" id="eb"></span>
  <h1 id="h1"></h1>
  <p class="lead" style="max-width:62ch" id="tag"></p>
  <div class="statrow" id="stats"></div>
</div></section>

<section class="sec"><div class="container">
  <h2 style="margin-bottom:12px">Как это выглядело</h2>
  <p class="muted" style="margin-bottom:34px">Пять видео с площадки. Ливень, плоты, гонка на воде.</p>
  <div class="proof">
    <div class="vframe main" role="button"><video preload="none" poster="video/raft-hero.jpg" data-src="video/raft-hero.mp4"></video>
      <span class="vtag">Видео дня</span><span class="vlabel">Полное видео тимбилдинга</span><span class="play"><span></span></span></div>
    <div class="side" id="side"></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:22px;margin-top:22px" id="side2"></div>
</div></section>

<section class="sec" style="padding-top:0"><div class="container">
  <div class="two">
    <div>
      <span class="eyebrow">Задача</span>
      <h2 style="margin:12px 0 18px" id="task"></h2>
      <div class="donen" id="done"></div>
    </div>
    <div class="tbox">
      <span class="eyebrow" style="color:var(--green)">Что было на площадке</span>
      <div id="story" style="margin-top:14px"></div>
      <a class="btn btn-green" href="#" style="margin-top:20px">Обсудить ивент для команды</a>
    </div>
  </div>
</div></section>

<div data-footer></div>
<script src="data.js"></script>
<script>
const c=window.CASE;
eb.textContent='Кейс · '+c.client+' · '+c.season;
h1.innerHTML=c.program+' <span class="green">для '+c.client+'</span>';
tag.textContent=c.lead;
stats.innerHTML=`
  <div class="scard accent"><div class="statnum">${c.metric}</div><p>${c.metricLabel}</p></div>
  <div class="scard"><div class="statnum">${c.people}</div><p>участников за один день</p></div>
  <div class="scard"><div class="statnum">100%</div><p>познакомились и стали друзьями</p></div>`;
side.innerHTML=[1,2].map(i=>`<div class="vframe" role="button"><video preload="none" poster="${c.videos[i].poster}" data-src="${c.videos[i].src}"></video><span class="vlabel" style="font-size:16px">${c.videos[i].title}</span><span class="play"><span style="width:56px;height:56px"></span></span></div>`).join('');
side2.innerHTML=[3,4].map(i=>`<div class="vframe" role="button" style="aspect-ratio:16/9"><video preload="none" poster="${c.videos[i].poster}" data-src="${c.videos[i].src}"></video><span class="vlabel">${c.videos[i].title}</span><span class="play"><span></span></span></div>`).join('');
task.textContent=c.task;
done.innerHTML=c.done.map(d=>`<div class="it"><b>→</b><div><b style="color:var(--ink)">${d.t}.</b> <span style="color:var(--gray)">${d.d}</span></div></div>`).join('');
story.innerHTML=c.story.map(s=>`<p style="color:#d6d8db;font-size:19px">${s}</p>`).join('');
</script>
<script src="common.js"></script>
</body></html>
