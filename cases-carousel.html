<!doctype html><html lang="ru"><head>
<meta charset="utf-8"><meta name="robots" content="noindex,nofollow"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>B3 Карусель — Все кейсы</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="base.css">
<style>
.head{padding-top:70px;display:flex;justify-content:space-between;align-items:flex-end;gap:20px;flex-wrap:wrap}
.arrows{display:flex;gap:12px}
.arrows button{width:56px;height:56px;border-radius:50%;border:2px solid var(--ink);background:#fff;cursor:pointer;font-size:22px;transition:.15s}
.arrows button:hover{background:var(--ink);color:#fff}
.track{display:flex;gap:26px;overflow-x:auto;scroll-snap-type:x mandatory;padding:10px 40px 30px;scroll-padding-left:40px;-ms-overflow-style:none;scrollbar-width:none}
.track::-webkit-scrollbar{display:none}
.slide{flex:0 0 clamp(320px,40vw,560px);scroll-snap-align:start;border-radius:var(--radius);overflow:hidden;
  border:1px solid var(--line);background:#fff;cursor:pointer;transition:.2s}
.slide:hover{box-shadow:0 24px 60px rgba(0,0,0,.12)}
.slide .vframe{aspect-ratio:16/10;border-radius:0}
.slide .sb{padding:26px 28px}
.slide .tag{display:flex;gap:10px;margin-bottom:12px}
.slide h3{font-size:27px}
.slide .m{display:flex;gap:20px;margin-top:14px;color:var(--gray);font-family:var(--disp);font-weight:700}
.slide .m b{color:var(--green)}
</style></head>
<body data-variant="B3">
<div data-header="light"></div>

<section class="sec" style="padding-bottom:0"><div class="container">
  <div class="head">
    <div><span class="eyebrow">Портфолио</span><h1 style="margin-top:12px">Кейсы Каталиста</h1></div>
    <div class="arrows"><button onclick="mv(-1)">←</button><button onclick="mv(1)">→</button></div>
  </div>
</div></section>

<section class="sec" style="padding-top:44px">
  <div class="track" id="track"></div>
  <div class="container"><a class="btn btn-ghost" href="#">Все кейсы →</a></div>
</section>

<div data-footer></div>
<script src="data.js"></script>
<script>
track.innerHTML=window.CASES.map(k=>`
  <a class="slide" href="${k.real?'case-cinema.html':'#'}">
    <div class="vframe" data-hover role="button"><video preload="none" poster="${k.poster}" data-src="${k.video}"></video>
      <span class="vtag">${k.tag}</span><span class="play"><span></span></span></div>
    <div class="sb"><div class="tag"><span class="chip" style="${k.real?'background:var(--green);color:#fff':''}">${k.real?'Полный кейс':k.client}</span></div>
      <h3>${k.program}</h3><div class="m"><span><b>${k.metric.split(' ')[0]}</b> ${k.metric.split(' ').slice(1).join(' ')}</span><span>${k.people}</span></div></div>
  </a>`).join('');
function mv(d){const t=document.getElementById('track');t.scrollBy({left:d*(t.querySelector('.slide').offsetWidth+26),behavior:'smooth'});}
</script>
<script src="common.js"></script>
</body></html>
