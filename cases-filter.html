<!doctype html><html lang="ru"><head>
<meta charset="utf-8"><meta name="robots" content="noindex,nofollow"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>B6 С фильтрами — Все кейсы</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="base.css">
<style>
.head{padding-top:70px}
.filters{display:flex;gap:12px;flex-wrap:wrap;margin-top:30px}
.fchip{font-family:var(--disp);font-weight:700;font-size:16px;padding:11px 22px;border-radius:100px;border:2px solid var(--line);
  background:#fff;cursor:pointer;transition:.15s}
.fchip:hover{border-color:var(--ink)}
.fchip.on{background:var(--green);border-color:var(--green);color:#fff}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin-top:40px}
.card{border-radius:var(--radius);overflow:hidden;border:1px solid var(--line);cursor:pointer;transition:.25s;background:#fff}
.card:hover{box-shadow:0 20px 50px rgba(0,0,0,.1);transform:translateY(-3px)}
.card.hide{display:none}
.card .vframe{aspect-ratio:16/10;border-radius:0}
.card .cb{padding:22px 24px}
.card h3{font-size:23px}
.card .m{color:var(--gray);font-family:var(--disp);font-weight:700;font-size:15px;margin-top:10px}
.card .m b{color:var(--green)}
.count{color:var(--gray);font-family:var(--disp);font-weight:700;margin-top:22px}
@media(max-width:820px){.grid{grid-template-columns:1fr 1fr}}
@media(max-width:560px){.grid{grid-template-columns:1fr}}
</style></head>
<body data-variant="B6">
<div data-header="light"></div>

<section class="head"><div class="container">
  <span class="eyebrow">Портфолио</span>
  <h1 style="margin:12px 0 8px">Кейсы Каталиста</h1>
  <p class="lead">Выбери формат и посмотри подходящие кейсы с видео.</p>
  <div class="filters" id="filters"></div>
  <div class="count" id="count"></div>
  <div class="grid" id="grid"></div>
</div></section>

<div data-footer></div>
<script src="data.js"></script>
<script>
const cats=['Все',...new Set(window.CASES.map(k=>k.tag))];
filters.innerHTML=cats.map((c,i)=>`<button class="fchip ${i===0?'on':''}" data-cat="${c}">${c}</button>`).join('');
grid.innerHTML=window.CASES.map(k=>`
  <a class="card" data-cat="${k.tag}" href="${k.real?'case-cinema.html':'#'}">
    <div class="vframe" data-hover role="button"><video preload="none" poster="${k.poster}" data-src="${k.video}"></video>
      <span class="vtag">${k.tag}</span><span class="play"><span style="width:56px;height:56px"></span></span></div>
    <div class="cb"><h3>${k.program}</h3><div class="m"><b>${k.metric.split(' ')[0]}</b> ${k.metric.split(' ').slice(1).join(' ')} · ${k.people}</div></div>
  </a>`).join('');
function upd(cat){
  let n=0;
  document.querySelectorAll('.card').forEach(c=>{const ok=(cat==='Все'||c.dataset.cat===cat);c.classList.toggle('hide',!ok);if(ok)n++;});
  document.getElementById('count').textContent='Показано кейсов: '+n;
}
filters.addEventListener('click',e=>{const b=e.target.closest('.fchip');if(!b)return;
  document.querySelectorAll('.fchip').forEach(x=>x.classList.remove('on'));b.classList.add('on');upd(b.dataset.cat);});
upd('Все');
</script>
<script src="common.js"></script>
</body></html>
