<!doctype html><html lang="ru"><head>
<meta charset="utf-8"><meta name="robots" content="noindex,nofollow"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>B1 Крупные карточки — Все кейсы</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="base.css">
<style>
.head{padding-top:70px}
.head h1{margin:12px 0 14px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:28px}
.card{border-radius:var(--radius);overflow:hidden;border:1px solid var(--line);background:#fff;transition:.2s;cursor:pointer}
.card:hover{box-shadow:0 24px 60px rgba(0,0,0,.12);transform:translateY(-4px)}
.card .vframe{aspect-ratio:16/10;border-radius:0}
.card .body{padding:26px 28px}
.card .tagrow{display:flex;gap:10px;align-items:center;margin-bottom:12px}
.card h3{font-size:28px}
.card .meta{display:flex;gap:20px;margin-top:14px;color:var(--gray);font-family:var(--disp);font-weight:700;font-size:16px}
.card .meta b{color:var(--green)}
.badge-real{background:var(--green);color:#fff}
@media(max-width:760px){.grid{grid-template-columns:1fr}}
</style></head>
<body data-variant="B1">
<div data-header="light"></div>

<section class="head"><div class="container">
  <span class="eyebrow">Портфолио</span>
  <h1>Кейсы Каталиста</h1>
  <p class="lead" style="max-width:60ch">Реальные тимбилдинги и корпоративные ивенты. С видео, цифрами и результатом для команды.</p>
</div></section>

<section class="sec" style="padding-top:56px"><div class="container">
  <div class="grid" id="grid"></div>
</div></section>

<div data-footer></div>
<script src="data.js"></script>
<script>
grid.innerHTML=window.CASES.map(k=>`
  <a class="card" href="${k.real?'case-cinema.html':'#'}">
    <div class="vframe" data-hover>
      <video preload="none" poster="${k.poster}" data-src="${k.video}"></video>
      <span class="vtag">${k.tag}</span><span class="play"><span></span></span>
    </div>
    <div class="body">
      <div class="tagrow">
        <span class="chip ${k.real?'badge-real':''}">${k.real?'Полный кейс':k.client}</span>
      </div>
      <h3>${k.program}</h3>
      <div class="meta"><span><b>${k.metric.split(' ')[0]}</b> ${k.metric.split(' ').slice(1).join(' ')}</span><span>${k.people}</span></div>
    </div>
  </a>`).join('');
</script>
<script src="common.js"></script>
</body></html>
