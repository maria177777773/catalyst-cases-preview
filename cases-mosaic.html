<!doctype html><html lang="ru"><head>
<meta charset="utf-8"><meta name="robots" content="noindex,nofollow"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>B5 Мозаика — Все кейсы</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="base.css">
<style>
.head{padding-top:70px}
.bento{display:grid;grid-template-columns:repeat(4,1fr);grid-auto-rows:250px;gap:18px;margin-top:44px}
.tile{position:relative;border-radius:var(--radius);overflow:hidden;cursor:pointer}
.tile video,.tile img{width:100%;height:100%;object-fit:cover}
.tile .ov{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.05),rgba(0,0,0,.72));display:flex;flex-direction:column;justify-content:flex-end;padding:24px;transition:.2s}
.tile:hover .ov{background:linear-gradient(180deg,rgba(10,186,89,.15),rgba(0,0,0,.8))}
.tile .tag{align-self:flex-start;background:var(--green);color:#fff;font-family:var(--disp);font-weight:800;font-size:11px;text-transform:uppercase;letter-spacing:.1em;padding:5px 11px;border-radius:100px;margin-bottom:auto}
.tile h3{color:#fff;font-size:clamp(20px,2vw,30px)}
.tile .m{color:#e9eaec;font-family:var(--disp);font-weight:700;font-size:15px;margin-top:6px}
.t-xl{grid-column:span 2;grid-row:span 2}
.t-w{grid-column:span 2}
.t-play{position:absolute;top:20px;right:20px;width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,.9);display:grid;place-items:center}
.t-play::after{content:'';border-left:15px solid var(--ink);border-top:9px solid transparent;border-bottom:9px solid transparent;margin-left:4px}
@media(max-width:820px){.bento{grid-template-columns:1fr 1fr;grid-auto-rows:200px}.t-xl{grid-column:span 2}}
</style></head>
<body data-variant="B5">
<div data-header="light"></div>

<section class="head"><div class="container">
  <span class="eyebrow">Портфолио</span>
  <h1 style="margin:12px 0 14px">Кейсы Каталиста</h1>
  <p class="lead" style="max-width:56ch">Мозаика тимбилдингов и корпоративных ивентов. Наведи, чтобы видео ожило.</p>
  <div class="bento" id="bento"></div>
</div></section>

<div data-footer></div>
<script src="data.js"></script>
<script>
const sizes=['t-xl','','','t-w','','',''];
bento.innerHTML=window.CASES.map((k,i)=>`
  <a class="tile ${sizes[i]||''}" href="${k.real?'case-cinema.html':'#'}" data-hover>
    <video preload="none" muted loop playsinline poster="${k.poster}" data-src="${k.video}"></video>
    <div class="ov"><span class="tag">${k.tag}</span><h3>${k.program}</h3><div class="m">${k.metric} · ${k.people}</div></div>
    <div class="t-play"></div>
  </a>`).join('');
// hover play on tiles (не .vframe, поэтому вешаем вручную)
document.querySelectorAll('.tile[data-hover]').forEach(t=>{
  const v=t.querySelector('video');
  t.addEventListener('mouseenter',()=>{if(!v.src&&v.dataset.src)v.src=v.dataset.src;v.play().catch(()=>{});});
  t.addEventListener('mouseleave',()=>v.pause());
});
</script>
<script src="common.js"></script>
</body></html>
